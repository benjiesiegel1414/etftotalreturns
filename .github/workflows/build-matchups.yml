name: Build ETF Matchup Pages

on:
  schedule:
    - cron: '15 10 * * *'   # daily at 10:15 UTC (~5:15am Central)
  workflow_dispatch:          # allow manual runs from the Actions tab
  push:
    paths:
      - 'generate-matchups.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate matchup pages
        run: node generate-matchups.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vs/ sitemap-matchups.xml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Rebuild ETF matchup pages ($(date -u +%Y-%m-%d))"
            git push
          fi
